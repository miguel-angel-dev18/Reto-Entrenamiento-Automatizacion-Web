name: Web Automation Pipeline

on:
  push:
    paths:
      - 'src/**'
  pull_request:
    paths:
      - 'src/**'
  workflow_dispatch:
    inputs:
      test_type:
        description: "Select test flow to execute"
        required: true
        default: "smoke"
        type: choice
        options:
          - smoke
          - regression
          - all

jobs:
  web-tests:
    name: Run Web Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Grant execute permission to Gradle
        run: chmod +x gradlew

      - name: Run Web tests
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual execution: ${{ github.event.inputs.test_type }}"

            if [ "${{ github.event.inputs.test_type }}" = "smoke" ]; then
              ./gradlew clean test -Dcucumber.filter.tags="@smoke"
            elif [ "${{ github.event.inputs.test_type }}" = "regression" ]; then
              ./gradlew clean test -Dcucumber.filter.tags="@regression"
            else
              ./gradlew clean test -Dcucumber.filter.tags="@web"
            fi
          else
            echo "Automatic execution: smoke tests"
            ./gradlew clean test -Dcucumber.filter.tags="@smoke"
          fi
        env:
          HEADLESS: true
          CHROME_OPTS: "--window-size=1920,1080"

      - name: Upload Serenity report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: serenity-web-report
          path: target

